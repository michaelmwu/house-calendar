services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-house_calendar}
      POSTGRES_USER: ${POSTGRES_USER:-house_calendar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-house_calendar}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
